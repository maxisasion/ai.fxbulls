<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Chart Analyzer - Pure Visual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0B0F1C;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: #151E2F;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #2A3442;
        }

        .upload-area {
            background: #1F2C40;
            border: 2px dashed #00BCD4;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #FFD700;
        }

        .analyze-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00BCD4 0%, #00A5B8 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.3em;
            font-weight: 700;
            cursor: pointer;
            margin: 20px 0;
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chart-container {
            background: #0A0E17;
            border-radius: 16px;
            padding: 10px;
            border: 1px solid #2E3B4E;
            position: relative;
        }

        #chartCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1F2C40;
            border-top: 3px solid #00BCD4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .download-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #00BCD4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            z-index: 10;
        }

        .download-btn:hover {
            background: #008c9e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <h3 style="color: white; margin-bottom: 10px;">📸 Drop Chart Here</h3>
            <p style="color: #8A9BB5;">Click or drag to upload</p>
        </div>

        <button class="analyze-btn" id="analyzeBtn" disabled>🔍 ANALYZE</button>

        <div class="chart-container">
            <canvas id="chartCanvas" width="1000" height="600"></canvas>
            <button class="download-btn" id="downloadBtn" style="display: none;">⬇️ Save Image</button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        class PureVisualAnalyzer {
            constructor() {
                this.canvas = document.getElementById('chartCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.currentImage = null;
                this.init();
            }

            init() {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('fileInput');
                const analyzeBtn = document.getElementById('analyzeBtn');
                const downloadBtn = document.getElementById('downloadBtn');

                uploadArea.addEventListener('click', () => fileInput.click());

                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#FFD700';
                });

                uploadArea.addEventListener('dragleave', () => {
                    uploadArea.style.borderColor = '#00BCD4';
                });

                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#00BCD4';
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        this.loadImage(file);
                    }
                });

                fileInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) {
                        this.loadImage(e.target.files[0]);
                    }
                });

                analyzeBtn.addEventListener('click', () => this.analyze());
                
                downloadBtn.addEventListener('click', () => this.downloadImage());
            }

            loadImage(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        this.currentImage = img;
                        this.drawImage(img);
                        document.getElementById('analyzeBtn').disabled = false;
                        document.getElementById('downloadBtn').style.display = 'none';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            drawImage(img) {
                const canvas = this.canvas;
                const ctx = this.ctx;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const scale = Math.min(
                    canvas.width / img.width,
                    canvas.height / img.height
                );
                
                const width = img.width * scale;
                const height = img.height * scale;
                
                const x = (canvas.width - width) / 2;
                const y = (canvas.height - height) / 2;
                
                ctx.drawImage(img, x, y, width, height);
                
                this.imagePos = { x, y, width, height, scale };
            }

            analyze() {
                if (!this.currentImage) return;
                
                document.getElementById('loading').classList.add('active');
                
                setTimeout(() => {
                    this.drawAnalysis();
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('downloadBtn').style.display = 'block';
                }, 1500);
            }

            drawAnalysis() {
                if (!this.currentImage) return;
                
                // Redraw original image
                this.drawImage(this.currentImage);
                
                const ctx = this.ctx;
                const pos = this.imagePos;
                
                // Randomly decide buy or sell
                const isBuy = Math.random() > 0.5;
                
                if (isBuy) {
                    this.drawBuySignal(pos);
                } else {
                    this.drawSellSignal(pos);
                }
            }

            drawBuySignal(pos) {
                const ctx = this.ctx;
                
                // Draw GREEN BUY arrow
                ctx.beginPath();
                ctx.moveTo(pos.x + 400, pos.y + 350);
                ctx.lineTo(pos.x + 450, pos.y + 250);
                ctx.lineTo(pos.x + 500, pos.y + 350);
                ctx.closePath();
                
                // Fill arrow
                ctx.fillStyle = '#00FF00';
                ctx.fill();
                
                // Add border
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw ENTRY line (white dashed)
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y + 300);
                ctx.lineTo(pos.x + pos.width, pos.y + 300);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Draw STOP LOSS line (red dashed) - below entry
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y + 350);
                ctx.lineTo(pos.x + pos.width, pos.y + 350);
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Draw TAKE PROFIT line (cyan dashed) - above entry
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y + 200);
                ctx.lineTo(pos.x + pos.width, pos.y + 200);
                ctx.strokeStyle = '#00FFFF';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Reset dash
                ctx.setLineDash([]);
            }

            drawSellSignal(pos) {
                const ctx = this.ctx;
                
                // Draw RED SELL arrow
                ctx.beginPath();
                ctx.moveTo(pos.x + 400, pos.y + 250);
                ctx.lineTo(pos.x + 450, pos.y + 350);
                ctx.lineTo(pos.x + 500, pos.y + 250);
                ctx.closePath();
                
                // Fill arrow
                ctx.fillStyle = '#FF0000';
                ctx.fill();
                
                // Add border
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw ENTRY line (white dashed)
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y + 300);
                ctx.lineTo(pos.x + pos.width, pos.y + 300);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Draw STOP LOSS line (red dashed) - above entry for sell
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y + 250);
                ctx.lineTo(pos.x + pos.width, pos.y + 250);
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Draw TAKE PROFIT line (cyan dashed) - below entry for sell
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y + 400);
                ctx.lineTo(pos.x + pos.width, pos.y + 400);
                ctx.strokeStyle = '#00FFFF';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                
                // Reset dash
                ctx.setLineDash([]);
            }

            downloadImage() {
                // Create download link
                const link = document.createElement('a');
                link.download = 'ict-analysis.png';
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }
        }

        // Initialize
        new PureVisualAnalyzer();
    </script>
</body>
</html>
